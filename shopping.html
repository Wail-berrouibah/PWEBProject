<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DigitalStore | Cart</title>
    <link rel="stylesheet" href="shopping.css">
</head>
<body>
    <div class="cart-container">
        <div class="cart-items">
            <h1>Your Cart</h1>
            <div class="cart-row-3d">
                <img src="https://via.placeholder.com/80" alt="item">
                <div class="item-info">
                    <h3>Nexus Pro G7</h3>
                    <p>Color: Slate Blue</p>
                </div>
                <div class="price-info">$1,299.00</div>
            </div>
            <div class="cart-row-3d">
                <img src="https://via.placeholder.com/80" alt="item">
                <div class="item-info">
                    <h3>Quantum Buds</h3>
                    <p>Color: White</p>
                </div>
                <div class="price-info">$199.00</div>
            </div>
        </div>

        <aside class="summary-card">
            <h2>Summary</h2>
            <div class="summary-line"><span>Subtotal</span><span>$1,498.00</span></div>
            <div class="summary-line"><span>Shipping</span><span>FREE</span></div>
            <hr>
            <div class="summary-line total"><span>Total</span><span>$1,498.00</span></div>
            <button class="checkout-btn">PROCEED TO CHECKOUT</button>
        </aside>
    </div>
</body>
</html>
