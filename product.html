<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalStore | Product Details</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">DigitalStore</div>
    </nav>

    <main class="container">
        <div class="product-grid">
            <div class="showcase">
                <div class="pedestal">
                    <img src="https://via.placeholder.com/400x400" alt="Tech Product" class="main-img">
                </div>
            </div>

            <div class="details">
                <h1 class="product-title">Nexus Pro G7</h1>
                <p class="price">$1,299.00</p>
                <p class="specs">Nano-Carbon housing, AI-Engine enabled, 10-hour battery life.</p>
                
                <div class="options">
                    <h3>Storage</h3>
                    <div class="tactile-group">
                        <label class="tactile-btn"><input type="radio" name="storage" checked><span>256GB</span></label>
                        <label class="tactile-btn"><input type="radio" name="storage"><span>512GB</span></label>
                        <label class="tactile-btn"><input type="radio" name="storage"><span>1TB</span></label>
                    </div>

                    <h3>Color</h3>
                    <div class="tactile-group">
                        <label class="tactile-btn color-dot"><input type="radio" name="color" checked><span style="background: #007BFF;"></span></label>
                        <label class="tactile-btn color-dot"><input type="radio" name="color"><span style="background: #ffffff;"></span></label>
                    </div>
                </div>
                <button class="add-btn">ADD TO CART</button>
            </div>
        </div>
    </main>
</body>
</html>
